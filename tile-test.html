<!DOCTYPE html>
<html><head><style>
body { margin: 0; background: #111; display: flex; justify-content: center; }
.container { position: relative; width: 100vw; max-width: 1376px; }
.container img { width: 100%; display: block; }
.marker { position: absolute; width: 20px; height: 20px; border-radius: 50%; 
  transform: translate(-50%, -50%); font-size: 10px; color: #fff; display: flex;
  align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }
.marker.top { background: rgba(255, 150, 0, 0.8); }
.marker.mid { background: rgba(255, 255, 0, 0.8); color: #000; }
.marker.bottom { background: rgba(0, 255, 100, 0.8); color: #000; }
</style></head><body>
<div class="container">
<img src="http://localhost:8765/public/assets/joustur/joustur-board.png">
<script>
const COLS = [30.0, 35.7, 41.4, 47.1, 52.9, 58.6, 64.3, 70.0];
const ROWS = { top: 37.0, shared: 47.0, bottom: 59.5 };

const container = document.querySelector('.container');
function addMarker(x, y, label, cls) {
  const m = document.createElement('div');
  m.className = 'marker ' + cls;
  m.style.left = x + '%';
  m.style.top = y + '%';
  m.textContent = label;
  container.appendChild(m);
}

[1,2,3,4].forEach((t, i) => addMarker(COLS[i], ROWS.top, t, 'top'));
addMarker(COLS[6], ROWS.top, '5', 'top');
addMarker(COLS[7], ROWS.top, '6', 'top');
for (let i = 0; i < 8; i++) addMarker(COLS[i], ROWS.shared, 7+i, 'mid');
[15,16,17,18].forEach((t, i) => addMarker(COLS[i], ROWS.bottom, t, 'bottom'));
addMarker(COLS[6], ROWS.bottom, '19', 'bottom');
addMarker(COLS[7], ROWS.bottom, '20', 'bottom');
</script>
</div></body></html>
