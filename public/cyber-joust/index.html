<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="theme-color" content="#070714" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; connect-src 'self' https://*.instantdb.com wss://*.instantdb.com https://esm.sh https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' data: blob:; object-src 'none'; script-src 'self' https://esm.sh https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:; upgrade-insecure-requests" />
  <title>Cyber Joust — Punch Skater™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070714;
      --panel: rgba(10, 10, 26, 0.88);
      --cyan: #00f0ff;
      --pink: #ff007f;
      --yellow: #ffea00;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 0, 127, 0.16), transparent 35%),
        radial-gradient(circle at bottom, rgba(0, 240, 255, 0.16), transparent 30%),
        var(--bg);
      color: #fff;
      font-family: 'Orbitron', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    .fallback {
      position: fixed;
      inset: auto 16px 16px;
      max-width: 340px;
      padding: 12px 14px;
      border: 2px solid var(--pink);
      background: var(--panel);
      font-size: 0.8rem;
      line-height: 1.5;
      z-index: 1;
    }

    .fallback a {
      color: var(--yellow);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js",
        "@instantdb/core": "https://esm.sh/@instantdb/core?bundle"
      }
    }
  </script>
</head>
<body>
  <div id="game-container"></div>
  <noscript>
    <div class="fallback">Cyber Joust needs JavaScript enabled. Head back to <a href="/">Punch Skater™</a> and relaunch with scripts on.</div>
  </noscript>
  <script type="module" src="./main.js"></script>
</body>
</html>
