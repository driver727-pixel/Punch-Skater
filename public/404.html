<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punch Skater</title>
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Encodes the full path/query/hash into a query string so GitHub Pages
      // redirects to index.html, which then decodes it back.
      // segmentCount = 0 because the app is deployed at a custom domain root.
      // Use segmentCount = 1 for a github.io/<repo-name> sub-path deployment.
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
