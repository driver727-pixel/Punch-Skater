<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Approved Mountainboard master image</title>
  <desc id="desc">A deterministic mountainboard with four large off-road wheels, channel trucks, foot straps, and a top-mounted battery box on a transparent background.</desc>
  <defs>
    <linearGradient id="deckFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e4348"/>
      <stop offset="45%" stop-color="#15191d"/>
      <stop offset="100%" stop-color="#06080a"/>
    </linearGradient>
    <linearGradient id="metalFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9aa3ad"/>
      <stop offset="50%" stop-color="#4f5963"/>
      <stop offset="100%" stop-color="#242a31"/>
    </linearGradient>
    <linearGradient id="batteryFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d36b"/>
      <stop offset="55%" stop-color="#be8f2e"/>
      <stop offset="100%" stop-color="#6c4812"/>
    </linearGradient>
    <radialGradient id="wheelRubber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4b5359"/>
      <stop offset="55%" stop-color="#1d2227"/>
      <stop offset="100%" stop-color="#090b0d"/>
    </radialGradient>
    <radialGradient id="hubFill" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#adb6bf"/>
      <stop offset="100%" stop-color="#55606b"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" transform="translate(120 60)">
    <ellipse cx="480" cy="540" rx="420" ry="86" fill="#000000" opacity="0.12"/>

    <g transform="translate(88 346)">
      <g fill="url(#wheelRubber)" stroke="#0e1114" stroke-width="12">
