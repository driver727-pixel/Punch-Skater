<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="theme-color" content="#070714" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; connect-src 'self' https://esm.sh https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com https://card-forge-proxy.onrender.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' data: blob:; object-src 'none'; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:; upgrade-insecure-requests" />
  <title>Classic Race — Punch Skater™</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070714;
      --panel: rgba(10, 10, 26, 0.88);
      --cyan: #00f0ff;
      --pink: #ff007f;
      --yellow: #ffea00;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 0, 127, 0.16), transparent 35%),
        radial-gradient(circle at bottom, rgba(0, 240, 255, 0.16), transparent 30%),
        var(--bg);
      color: #fff;
      font-family: 'Orbitron', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    .fallback {
      position: fixed;
      inset: auto 16px 16px;
      max-width: 340px;
      padding: 12px 14px;
      border: 2px solid var(--pink);
      background: var(--panel);
      font-size: 0.8rem;
      line-height: 1.5;
      z-index: 1;
    }

    .fallback a { color: var(--yellow); }

    #back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--cyan);
      background: var(--panel);
      border: 2px solid var(--cyan);
      padding: 8px 14px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
      letter-spacing: 0.05em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }

    #back-btn:hover {
      opacity: 1;
      background: rgba(0, 240, 255, 0.12);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js"
      }
    }
  </script>
</head>
<body>
  <a id="back-btn" href="/arena/classic?tab=arcade">← BACK</a>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search).get('returnUrl');
      if (p) document.getElementById('back-btn').href = p;
    })();
  </script>
  <div id="game-container"></div>
  <noscript>
    <div class="fallback">Classic Race needs JavaScript enabled. Head back to <a href="/">Punch Skater™</a> and relaunch with scripts on.</div>
  </noscript>
  <script type="module" src="./main.js"></script>
</body>
</html>
